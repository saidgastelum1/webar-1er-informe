<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Experiencias AR Institucionales</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <!-- Fuente elegante -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "Poppins", sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      color: #fff;
      overflow: hidden;
    }

    h1 {
      font-weight: 600;
      font-size: 2.2rem;
      margin-bottom: 40px;
      animation: fadeDown 1s ease forwards;
    }

    a {
      text-decoration: none;
      width: 100%;
      max-width: 380px;
      margin: 12px 0;
      display: flex;
      justify-content: center;
    }

    button {
      width: 100%;
      padding: 18px 25px;
      font-size: 1.2rem;
      background: rgba(255, 255, 255, 0.15);
      border: 2px solid rgba(255, 255, 255, 0.3);
      color: white;
      border-radius: 18px;
      backdrop-filter: blur(6px);
      cursor: pointer;
      transition: 0.3s ease;
      font-weight: 500;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.25);
      animation: fadeUp 1s ease forwards;
    }

    button:hover {
      background: rgba(255, 255, 255, 0.25);
      transform: scale(1.05);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.35);
    }

    button:active {
      transform: scale(0.97);
    }

    /* Animaciones */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Responsivo */
    @media (max-width: 480px) {
      h1 {
        font-size: 1.6rem;
        margin-bottom: 25px;
      }
      button {
        font-size: 1.05rem;
        padding: 15px 20px;
      }
    }
  </style>
</head>

<body>
  <h1>Selecciona tu Experiencia AR</h1>

  <a href="ar-markers-ERA.html">
    <button>📱 Marcadores Institucionales</button>
  </a>

  <a href="ar-face-filter-ERA.html">
    <button>🐆 Filtro Facial Jaguar</button>
  </a>

</body>
</html>
